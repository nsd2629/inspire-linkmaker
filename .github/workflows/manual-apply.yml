name: Manual Apply & Deploy (launcher)

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to run Apply & Deploy"
        default: "production"
        required: true

permissions:
  actions: write     # ← Actions API 호출 허용
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch auto-apply on target branch (no third-party)
        uses: actions/github-script@v7
        with:
          script: |
            const ref = core.getInput('target_branch') || 'production';
            const workflow = 'auto-apply-patches.yml'; // 파일명 그대로
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflow,
              ref,
            });
            core.info(`Dispatched ${workflow} on ${ref}`);

